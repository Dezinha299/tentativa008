name: Discord
on:
  - push

jobs:
  discord:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Discord Webhook
        uses: Snidd1/discord-comits@v1.6
        with:
          webhook_url:  ${{ secrets.DISCORD_WEBHOOKS_URL }}
          template: "avatar-with-link"
          include-extras: true